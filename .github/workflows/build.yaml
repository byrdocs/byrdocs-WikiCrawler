name: Build
on:
  push:
    branches:
      master
    tags:
      - "v*"
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Set up C++ environment and dependencies
      run: |
        sudo apt update
        sudo apt install -y g++ make cmake curl libcurl4-openssl-dev libcurlpp-dev nlohmann-json3-dev
    - name: Compile traversal
      run: |
        mkdir build
        cmake -DCMAKE_BUILD_TYPE=Release -B build/ .
        make -C build/ traversal
    - uses: actions/upload-artifact@v4
      with:
        name: traversal
        path: build/traversal
    - name: Create Release and Upload Release Asset
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref,'refs/tags/')
      with:
        tag_name: ${{ github.ref }}
        name: Release ${{ github.ref }}
        draft: false
        files: build/traversal
